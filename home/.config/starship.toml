# Move the prompt to a new line
add_newline = true
command_timeout = 200

# The "format" defines the top line. 
# The "continuation_prompt" and "character" define the second line.
format = """
$directory\
$git_branch\
$git_status\
$conda\
$python\
$line_break\
$character"""

[character]
success_symbol = "[ÔØ»](bold cyan)"
error_symbol = "[Ô£ù](bold cyan)"

[directory]
truncation_length = 2
truncation_symbol = "ÔÇĞ/"
read_only = " ¾░î¥"
style = "bold cyan"
# This ensures it looks like original config
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "´Éİ "
format = "[$symbol$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
ahead = "Ôçí${count} "
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count} "
behind = "Ôçú${count} "
up_to_date = "´Çî "
untracked = "? "
modified = "¯®▒ "
conflicted = "¯«½ "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""

[conda]
symbol = "´äî "
format = "via [$symbol$environment]($style) "

[python]
symbol = "¯êÁ "
format = "via [${symbol}${version} (\\($virtualenv\\))]($style) "

# Command Duration
[cmd_duration]
min_time = 0
format = "took [$duration]($style)"
style = "bold yellow"

